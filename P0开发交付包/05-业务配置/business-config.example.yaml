schema_version: "2.0.0"
config_id: prototype_p0_example

deployment:
  label: "开发示例配置（未批准用于生产）"
  environment: development
  enabled: false
  example_only: true

business:
  currency: CNY
  timezone: Asia/Shanghai
  money_storage: MINOR_UNITS_INTEGER
  order_mode: IMMEDIATE_ONLY
  max_active_orders_per_customer: 1
  max_active_orders_per_player: 1

discord:
  guild_id: "1200000000000000001"
  presence_intent_enabled: true
  channels:
    public_entry_channel_id: "1200000000000000011"
    private_order_category_id: "1200000000000000012"
    order_archive_category_id: "1200000000000000013"
    dispatch_channel_id: "1200000000000000014"
    player_workbench_channel_id: "1200000000000000018"
    gift_review_channel_id: "1200000000000000019"
    gift_broadcast_channel_id: "1200000000000000016"
    staff_task_channel_id: "1200000000000000015"
    operations_alert_channel_id: "1200000000000000017"
  roles:
    player_role_id: "1200000000000000021"
    staff_l1_role_id: "1200000000000000022"
    staff_l2_role_id: "1200000000000000023"
    staff_l3_role_id: "1200000000000000024"
    staff_l4_role_id: "1200000000000000025"
    staff_notification_role_id: "1200000000000000026"
    operations_notification_role_id: "1200000000000000027"
  role_sync:
    l1_l2_auto_apply: true
    l3_l4_require_l4_confirmation: true
    downgrade_revokes_sessions: true
  bootstrap_l4_discord_user_id: "1200000000000000031"

catalog:
  games:
    - id: valorant_example
      label_zh: "示例：无畏契约（未确认）"
      enabled: false
      classification: UNAPPROVED_EXAMPLE
  regions:
    - id: valorant_na_example
      game_id: valorant_example
      label_zh: "示例：北美区服（未确认）"
      enabled: false
      classification: UNAPPROVED_EXAMPLE
  services:
    - id: valorant_entertainment_hourly_example
      game_id: valorant_example
      region_ids:
        - valorant_na_example
      label_zh: "示例：娱乐陪玩每小时（未确认）"
      billing_unit_minutes: 60
      min_units: 2
      customer_unit_price_minor: 6000
      player_unit_payout_minor: 4000
      currency: CNY
      version: 1
      enabled: false
      classification: UNAPPROVED_EXAMPLE

gifts:
  catalog:
    - id: gift_flower_example
      label_zh: "示例：鲜花礼物（未确认）"
      price_minor: 5200
      currency: CNY
      commission_eligible: true
      broadcast_template: "{sender_name} 向 {receiver_name} 赠送了 {gift_name}"
      enabled: false
      classification: UNAPPROVED_EXAMPLE
    - id: gift_cake_example
      label_zh: "示例：蛋糕礼物（未确认）"
      price_minor: 18800
      currency: CNY
      commission_eligible: true
      broadcast_template: "{sender_name} 向 {receiver_name} 赠送了 {gift_name}"
      enabled: false
      classification: UNAPPROVED_EXAMPLE
    - id: gift_rocket_example
      label_zh: "示例：火箭礼物（未确认）"
      price_minor: 52000
      currency: CNY
      commission_eligible: true
      broadcast_template: "{sender_name} 向 {receiver_name} 赠送了 {gift_name}"
      enabled: false
      classification: UNAPPROVED_EXAMPLE
  receiver_policy: ORDER_CURRENT_PLAYER
  manual_review_required: true
  eligible_order_statuses:
    - ACCEPTED
    - IN_SERVICE
    - PENDING_CONFIRMATION
    - COMPLETED
  post_completion_window_minutes: 1440

funding:
  balance_summary_fields:
    - providerBalanceMinor
    - reservedMinor
    - availableMinor
    - currency
    - fetchedAt
  available_minor_formula: providerBalanceMinor - reservedMinor
  reservation_mode: PROVIDER_NATIVE_HOLD
  native_hold_preferred: true
  allow_local_fallback_when_native_unsupported: true
  all_spend_via_unified_api: true
  recheck_provider_balance_before_local_reserve_or_capture: true
  reservation_ttls:
    order_unaccepted_minutes: 30
    gift_pending_approval_minutes: 30
    expiry_action: RELEASE_AND_CREATE_STAFF_TASK
  stale_and_deficit_handling:
    provider_balance_stale_after_seconds: 30
    stale_action: BLOCK_NEW_RESERVATIONS_REFRESH_AND_ALERT
    deficit_condition: providerBalanceMinor < reservedMinor
    deficit_action: BLOCK_NEW_SPEND_KEEP_RESERVATIONS_AND_CREATE_STAFF_TASK
  lifecycle:
    order:
      reserve_on: ORDER_SUBMITTED
      capture_on: ORDER_COMPLETED
      release_on:
        - ORDER_CANCELLED
        - ORDER_RESERVATION_EXPIRED
        - ORDER_REJECTED
        - ORDER_FAILED
      dispute_on: ORDER_DISPUTED
      dispute_action: KEEP_RESERVED
      partial_resolution_action: CAPTURE_RESOLVED_AND_RELEASE_REMAINDER
    gift:
      reserve_on: GIFT_REQUESTED
      capture_on: GIFT_APPROVED
      release_on:
        - GIFT_REJECTED
        - GIFT_EXPIRED
        - GIFT_WITHDRAWN
  record_invariants:
    reserved_minor_source: SUM_ACTIVE_FUND_RESERVATIONS
    business_source_required: true
    idempotency_key_required: true
    version_required: true
    concurrency_control: UNIFIED_API_ATOMIC

referral:
  enabled: true
  binding:
    methods:
      - INVITE_CODE
      - ADMIN_MANUAL
    one_active_source_per_referred_user: true
    programs_mutually_exclusive: true
    prevent_self_referral: true
    prevent_duplicate_identity_referral: true
    referred_user_can_modify: false
    changes_are_audited: true
  privacy:
    referred_user_visibility: NONE
    blocked_surfaces:
      - USER_API
      - DISCORD
      - ERROR
      - EXPORT
      - NOTIFICATION
    beneficiary_visibility: SELF_ONLY
    source_user_display: MASKED_BY_DEFAULT
    l1_visibility: NO_BENEFICIARY_OR_AMOUNT
    l2_visibility: TASK_SCOPED_LIMITED
    l3_l4_visibility: FULL_AUDITED
  adjustments:
    append_only: true
    hard_delete_allowed: false
    amount_storage: NON_NEGATIVE_ABSOLUTE_VALUE
    direction_source: ADJUSTMENT_TYPE
  programs:
    PROMOTER_FIRST_PURCHASE:
      enabled: true
      beneficiary_type: PROMOTER
      eligible_sources:
        - ORDER_NET_CONSUMPTION
        - GIFT_NET_CONSUMPTION
      binding_deadline: BEFORE_FIRST_ELIGIBLE_NET_CONSUMPTION
      reward_mode: PERCENT_BPS
      fixed_amount_minor: null
      rate_bps: 200
      settlement_trigger: FIRST_ELIGIBLE_NET_CONSUMPTION
      max_settlements: 1
      after_settlement: PERMANENTLY_ENDED
    PLAYER_LIFETIME:
      enabled: true
      beneficiary_type: PLAYER
      eligible_sources:
        - ORDER_NET_CONSUMPTION
        - GIFT_NET_CONSUMPTION
      rate_bps: 200
      settlement_trigger: EACH_ELIGIBLE_NET_CONSUMPTION
      duration: LIFETIME
  automatic_payout_enabled: false

player_tags:
  - id: tag_game_valorant_example
    category: GAME
    label_zh: "示例：无畏契约（未确认）"
    enabled: false
    classification: UNAPPROVED_EXAMPLE
  - id: tag_service_entertainment_example
    category: SERVICE
    label_zh: "示例：娱乐陪玩（未确认）"
    enabled: false
    classification: UNAPPROVED_EXAMPLE
  - id: tag_region_na_example
    category: REGION
    label_zh: "示例：北美区服（未确认）"
    enabled: false
    classification: UNAPPROVED_EXAMPLE
  - id: tag_language_zh_example
    category: LANGUAGE
    label_zh: "示例：中文交流（未确认）"
    enabled: false
    classification: UNAPPROVED_EXAMPLE

dispatch:
  dispatch_timeout_minutes: 5
  dispatch_max_rounds: 3
  auto_expand_candidates: false
  required_review_status: ACTIVE
  required_availability: AVAILABLE
  required_presence: ONLINE
  require_no_active_order: true
  match_tag_categories:
    - GAME
    - SERVICE
    - REGION
  winner_policy: FIRST_TRANSACTIONAL_ACCEPT
  transparency:
    visible_stages:
      - VALIDATING
      - MATCHING
      - NOTIFYING
      - AWAITING_ACCEPTANCE
      - ACCEPTED
      - TIMED_OUT
    show_notified_candidate_count: true
    show_timeout_next_step: true
    show_accepted_player_summary: true

readiness:
  required_parties:
    - CUSTOMER
    - PLAYER
  transition_from: ACCEPTED
  transition_to: IN_SERVICE
  start_policy: BOTH_PARTIES_READY
  player_can_start_unilaterally: false
  readiness_timeout_minutes: 10
  timeout_action: PAUSE_AUTOMATION_AND_CREATE_STAFF_TASK

cancellation:
  preview_required_before:
    - AUTO_CANCEL
    - REQUEST_STAFF
  preview_fields:
    - automaticEligibility
    - estimatedReleaseMinor
    - estimatedRefundMinor
    - processingMethod
    - expectedTiming
  preview_expiry_seconds: 60
  expired_preview_action: REQUIRE_REFRESH
  execute_revalidates_atomically: true
  manual_review_action: CREATE_STAFF_TAKEOVER_TASK

player_workspace:
  enabled: true
  sections:
    - QUALIFICATION
    - AVAILABILITY
    - CURRENT_ORDER
    - MATCHING_ORDERS
    - REQUIREMENT_DETAILS
    - COUNTDOWN
    - EARNINGS_SUMMARY
    - NEXT_ACTION
  availability_controls:
    - AVAILABLE
    - BUSY
  actions:
    - SET_AVAILABILITY
    - ACCEPT_ORDER
    - CONFIRM_READINESS
    - REQUEST_COMPLETION

operations_dashboard:
  enabled: true
  staff_controls:
    takeover:
      enabled: true
      permission_code: order.takeover
      minimum_level: L2_SUPERVISOR
    pause:
      enabled: true
      permission_code: order.pause
      minimum_level: L2_SUPERVISOR
    resume:
      enabled: true
      permission_code: order.resume
      minimum_level: L2_SUPERVISOR
    reassign:
      enabled: true
      permission_code: order.reassign
      minimum_level: L2_SUPERVISOR
    submit_for_approval:
      enabled: true
      permission_code: approval.create
      minimum_level: L1_SUPPORT
  metrics:
    - id: TODAY_ORDER_COUNT
      label_zh: 今日订单
      unit: COUNT
      window: BUSINESS_DAY
      definition: 业务时区当日创建的订单数量。
    - id: IN_PROGRESS_ORDER_COUNT
      label_zh: 进行中订单
      unit: COUNT
      window: POINT_IN_TIME
      definition: 当前处于派单、已接单、服务中或待完成确认状态的订单数量。
    - id: PENDING_STAFF_TASK_COUNT
      label_zh: 待处理任务
      unit: COUNT
      window: POINT_IN_TIME
      definition: 当前状态为待认领或处理中且尚未解决的客服任务数量。
    - id: COMPLETED_ORDER_NET_CONSUMPTION_MINOR
      label_zh: 已完成净消费
      unit: MINOR
      window: BUSINESS_DAY
      definition: 当日完成订单已捕获金额减去退款与追加冲正后的净消费。
    - id: GIFT_NET_CONSUMPTION_MINOR
      label_zh: 礼物净消费
      unit: MINOR
      window: BUSINESS_DAY
      definition: 当日已批准并捕获的礼物金额减去追加冲正后的净消费。
    - id: ACTIVE_RESERVED_MINOR
      label_zh: 预留总额
      unit: MINOR
      window: POINT_IN_TIME
      definition: 当前全部有效 FundReservation 剩余金额之和，即 reservedMinor 的运营汇总。
    - id: DISPATCH_SUCCESS_RATE_BPS
      label_zh: 派单成功率
      unit: BASIS_POINTS
      window: BUSINESS_DAY
      definition: 当日成功接单的派单订单数除以已发起派单订单数并乘以 10000，分母为零时返回零。
    - id: EXCEPTION_COUNT
      label_zh: 异常数
      unit: COUNT
      window: POINT_IN_TIME
      definition: 当前未关闭的余额过期、预留缺口、就绪超时、取消或自动化异常数量。

timeouts:
  customer_no_show_review_minutes: 15
  completion_confirmation_minutes: 30
  gift_review_reminder_minutes: 10
  channel_read_only_after_completion_minutes: 0
  channel_archive_after_completion_minutes: 1440

feature_flags:
  new_orders_enabled: true
  auto_dispatch_enabled: true
  gift_requests_enabled: true
  maintenance_notice: false

