reason_codes:
  - id: DRAFT_CANCELLED_BY_CUSTOMER
    label_zh: 用户取消草稿订单
    enabled: true
    applies_to: [ORDER_CANCEL]
    requires_note: false
    requires_evidence: false
  - id: DISPATCH_TIMEOUT_CANCELLED_BY_CUSTOMER
    label_zh: 派单超时后用户选择取消并释放预留
    enabled: true
    applies_to: [ORDER_CANCEL]
    requires_note: false
    requires_evidence: false
  - id: PLAYER_NO_SHOW
    label_zh: 陪玩未按时开始或未出现
    enabled: true
    applies_to: [ORDER_RESOLUTION, REFUND, PLAYER_STATUS]
    requires_note: true
    requires_evidence: true
  - id: CUSTOMER_NO_SHOW
    label_zh: 用户未出现或无法联系
    enabled: true
    applies_to: [ORDER_RESOLUTION, REFUND]
    requires_note: true
    requires_evidence: true
  - id: SERVICE_INTERRUPTED
    label_zh: 服务中断或提前结束
    enabled: true
    applies_to: [ORDER_RESOLUTION, REFUND, EARNING_ADJUSTMENT]
    requires_note: true
    requires_evidence: true
  - id: COMPLETION_DISPUTE
    label_zh: 完成状态或服务结果存在争议
    enabled: true
    applies_to: [ORDER_RESOLUTION, REFUND, EARNING_ADJUSTMENT]
    requires_note: true
    requires_evidence: true
  - id: AUTOMATION_FAILURE
    label_zh: 自动化或第三方接口异常
    enabled: true
    applies_to: [ORDER_RESOLUTION, REFUND, JOB_RETRY]
    requires_note: true
    requires_evidence: false
  - id: GIFT_DETAILS_MISMATCH
    label_zh: 礼物品类、目标或金额与用户确认不一致
    enabled: true
    applies_to: [GIFT_REJECT]
    requires_note: true
    requires_evidence: false
  - id: GIFT_CUSTOMER_WITHDREW
    label_zh: 用户在扣款前撤回送礼请求
    enabled: true
    applies_to: [GIFT_REJECT]
    requires_note: true
    requires_evidence: false
  - id: INSUFFICIENT_BALANCE
    label_zh: 第三方账户实时余额不足
    enabled: true
    applies_to: [GIFT_REJECT, ORDER_CANCEL]
    requires_note: false
    requires_evidence: false
  - id: PLAYER_REVIEW_APPROVED
    label_zh: 陪玩审核通过
    enabled: true
    applies_to: [PLAYER_STATUS]
    requires_note: true
    requires_evidence: true
  - id: PLAYER_PAUSED_FOR_RISK
    label_zh: 因运营风险暂停陪玩接单
    enabled: true
    applies_to: [PLAYER_STATUS]
    requires_note: true
