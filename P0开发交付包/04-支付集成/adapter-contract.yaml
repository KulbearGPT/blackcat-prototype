  - {id: PAY-C05, operation: createHold, assertion: same key and fingerprint creates one hold and returns it on replay}
  - {id: PAY-C06, operation: createHold, assertion: same key with changed amount or expiry returns IDEMPOTENCY_CONFLICT}
  - {id: PAY-C07, operation: createHold, assertion: expiry outside proven limits is rejected before provider mutation}
