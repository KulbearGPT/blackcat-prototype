x-idempotency-policy:
  keyFormats:
    orderHold: hold:order:{orderId}:v1
    giftHold: hold:gift:{giftRequestId}:v1
    capture: capture:hold:{fundReservationId}:v{fundReservationVersion}
    release: release:hold:{fundReservationId}:v{fundReservationVersion}
    fallbackDebit: debit:reservation:{fundReservationId}:v{fundReservationVersion}
    refund: refund:{originalTransactionId}:{resolutionId}:v1
  localUniqueConstraint: [provider, operation, idempotencyKey]
  sameKeySameFingerprint: return-existing-result
  sameKeyDifferentFingerprint: IDEMPOTENCY_CONFLICT
  requestFingerprintFields:
    createHold: [fundReservationId, fundReservationVersion, externalUserId, amount, businessSource, businessReference, expiresAt]
    captureHold: [holdRef, fundReservationId, fundReservationVersion, amount, businessReference]
    releaseHold: [holdRef, fundReservationId, fundReservationVersion, reasonCode, amount]
    createReservationDebit: [fundReservationId, fundReservationVersion, externalUserId, amount, businessSource, businessReference]
    createRefund: [originalTransactionRef, amount, reasonCode, businessReference]

x-state-transition-policy:
  hold:
    UNKNOWN: [UNKNOWN, PENDING, ACTIVE, PARTIALLY_CAPTURED, CAPTURED, RELEASED, EXPIRED, FAILED]
    PENDING: [PENDING, ACTIVE, PARTIALLY_CAPTURED, CAPTURED, RELEASED, EXPIRED, FAILED]
    ACTIVE: [ACTIVE, PARTIALLY_CAPTURED, CAPTURED, RELEASED, EXPIRED]
    PARTIALLY_CAPTURED: [PARTIALLY_CAPTURED, CAPTURED, RELEASED, EXPIRED]
    CAPTURED: [CAPTURED]
    RELEASED: [RELEASED]
    EXPIRED: [EXPIRED]
    FAILED: [FAILED]
  transaction:
    UNKNOWN: [UNKNOWN, PENDING, SUCCEEDED, FAILED]
    PENDING: [PENDING, SUCCEEDED, FAILED]
    SUCCEEDED: [SUCCEEDED]
    FAILED: [FAILED]
  terminalConflictRule: preserve-first-verified-terminal-state-and-alert

x-expiry-policy:
  providerNativeHold:
    businessExpiresBeforeProviderBySeconds: 60
    insufficientMaximumTtl: choose-local-fallback-before-reservation-creation
    expiredDuringLifecycle: block-capture-and-do-not-switch-to-fallback-debit
  localReservationFallback:
    owner: unified-business-api
    expiryAction: atomically-release-and-increment-version
    providerReleaseCall: none

x-reconciliation-policy:
  scheduleAfterSeconds: [15, 60, 300, 900]
  staffReviewAfterSeconds: 1800
  nativeHold: {operation: getHold, lookup: [PROVIDER_HOLD_REF, IDEMPOTENCY_KEY], statuses: [UNKNOWN, PENDING, ACTIVE, PARTIALLY_CAPTURED]}
  transaction: {operation: getTransaction, lookup: [PROVIDER_REF, IDEMPOTENCY_KEY], statuses: [UNKNOWN, PENDING]}
  balanceDeficit:
    calculation: max-reservedMinor-minus-providerBalanceMinor-zero
    triggers: [periodic-refresh, before-new-reservation, before-fallback-capture, provider-anomaly]
    actions:
      - block-new-reservations
      - preserve-existing-reservations
      - emit-provider_balance_deficit_alert
      - create-AUTOMATION_FAILURE-with-reason-PROVIDER_BALANCE_DEFICIT
      - notify-L2_SUPERVISOR-L3_OPERATIONS-and-L4_ADMIN_OWNER
    forbidden: [silently-shrink-reservations, direct-debit-without-reservation, auto-release-to-hide-deficit]

x-webhook-policy:
  verifyBeforeParse: true
  deduplicateBy: [provider, eventId]
  duplicateResponse: HTTP-200-without-reapplying
  holdEvents: [HOLD_CREATED, HOLD_UPDATED, HOLD_CAPTURED, HOLD_RELEASED, HOLD_EXPIRED]
  transactionEvents: [DEBIT_UPDATED, REFUND_UPDATED]
  ordering: {preferred: providerSequence, fallback: occurredAt-and-terminal-precedence}
  unknownReference: quarantine-and-alert
  expiredHoldRule: expire-once-block-capture-never-create-fallback-debit

