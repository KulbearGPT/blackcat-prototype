openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Payment Provider Neutral Funding Adapter Contract
  version: 1.2.0-prototype
  description: |
    P0 contract-test facade for the unified business API. Funding uses a
    provider-native hold when the complete lifecycle and usable lifetime are
    proven; otherwise it uses an approved local FundReservation fallback.
    The adapter returns the provider balance only. The business API computes
    reservedMinor and availableMinor and owns every business funding decision.
servers:
  - url: http://localhost:4100
    description: Deterministic local mock adapter
tags:
  - name: Capabilities
  - name: Identity
  - name: Balance
  - name: Holds
  - name: Transactions
  - name: Webhooks
security:
  - AdapterServiceToken: []
x-runtime-binding: in-process-or-contract-test-facade
x-money-policy:
  representation: minor-units-integer
  currency: ISO-4217-uppercase
  prototypeCurrency: CNY
x-funding-mode-policy:
  owner: unified-business-api
  evidence: discoverCapabilities-plus-approved-supplier-checklist
  modes: [PROVIDER_NATIVE_HOLD, LOCAL_RESERVATION_FALLBACK]
  snapshotRule: one FundReservation keeps one mode for its entire lifecycle
  nativeHoldRequirements:
    - create-capture-release-get-proven
    - idempotent-writes-and-lookup-proven
    - maximum-hold-lifetime-covers-business-window-plus-safety-margin
  fallbackRequirements:
    - idempotent-provider-debit-and-lookup-proven
    - fresh-provider-balance-rechecked-before-capture
    - fundReservationId-and-fundReservationVersion-required-on-every-debit
  directDebitRule: unbound ORDER or GIFT debit is prohibited
x-business-balance-policy:
  adapterFields: [providerBalanceMinor, currency, fetchedAt]
  businessApiFields: [providerBalanceMinor, reservedMinor, availableMinor, currency, fetchedAt]
  activeFundReservationStatuses: [PENDING, ACTIVE, DISPUTED, PARTIALLY_SETTLED]
  reservedMinor: sum-of-active-FundReservation-amounts
  availableMinor: providerBalanceMinor-minus-reservedMinor
  deficitRule: preserve negative availableMinor, block new reservations and alert
x-business-lifecycle-policy:
  order:
    reserve: submit
    readiness: customer-and-player-must-both-be-ready-before-IN_SERVICE
    capture: completion
    cancelBeforeCapture: release
    cancelAfterCapture: refund
  gift:
    reserve: request
    capture: approval
    rejectExpireOrWithdrawBeforeCapture: release
    reverseAfterCapture: refund
  partialResolution: capture-approved-amount-and-release-remainder
  referralPrograms: [PROMOTER_FIRST_PURCHASE, PLAYER_LIFETIME]
  referralRule: consumption-and-referral-facts-follow-successful-capture-only
x-default-policies:
  timeouts:
    connectMs: 2000
    readOperationTotalMs: 5000
    writeOperationTotalMs: 8000
    webhookVerificationMs: 500
  retries:
    reads: {maxRetries: 2, backoffMs: [200, 500], jitter: full}
    writes: {maxBlindRetries: 0, rule: query-before-retry-with-original-key}
  reconciliation:
    scheduleAfterSeconds: [15, 60, 300, 900]
    staffReviewAfterSeconds: 1800

paths:
  /adapter/v1/capabilities:
    get:
      tags: [Capabilities]
      operationId: discoverCapabilities
      summary: Discover normalized provider funding capabilities
      description: |
        Discovery reports observed support, not production enablement. The
        business API selects PROVIDER_NATIVE_HOLD only after blocking checklist
        evidence proves create, capture, release, get, idempotency and expiry.
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      responses:
        '200':
          description: Normalized capabilities
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderCapabilities'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/users:resolve:
    post:
      tags: [Identity]
      operationId: resolveUser
      summary: Resolve and verify a provider user
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ResolveUserRequest'}
      responses:
        '200':
          description: User resolved
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ResolvedUser'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/users/{externalUserId}/provider-balance:
    get:
      tags: [Balance]
      operationId: getProviderBalance
      summary: Get the current provider balance
      description: |
        Returns providerBalanceMinor. It never returns reservedMinor or
        availableMinor; the business API computes those from FundReservation.
      parameters:
        - $ref: '#/components/parameters/ExternalUserId'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      responses:
        '200':
          description: Fresh provider balance snapshot
          content:
            application/json:
              schema: {$ref: '#/components/schemas/ProviderBalanceSnapshot'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/holds:
    post:
      tags: [Holds]
      operationId: createHold
      summary: Create one idempotent provider-native hold
      description: |
        Used only for a FundReservation whose snapshotted mode is
        PROVIDER_NATIVE_HOLD. UNKNOWN and PENDING are recovered with getHold and
        never cause an automatic switch to local fallback.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateHoldRequest'}
      responses:
        '200':
          description: Existing hold returned idempotently
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Hold'}
        '201':
          description: Hold created
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Hold'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/holds/{lookupValue}:
    get:
      tags: [Holds]
      operationId: getHold
      summary: Get a hold by provider reference or idempotency key
      parameters:
        - $ref: '#/components/parameters/HoldLookupValue'
        - $ref: '#/components/parameters/HoldLookupType'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      responses:
        '200':
          description: Current normalized hold
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Hold'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/holds/{holdRef}:capture:
    post:
      tags: [Holds]
      operationId: captureHold
      summary: Capture all or an approved part of an active hold
      description: |
        Called on order completion or gift approval, never on submit, request or
        readiness. The FundReservation binding and version are mandatory.
      parameters:
        - $ref: '#/components/parameters/HoldRef'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CaptureHoldRequest'}
      responses:
        '200':
          description: Hold after capture or idempotent replay
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Hold'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/holds/{holdRef}:release:
    post:
      tags: [Holds]
      operationId: releaseHold
      summary: Release all or the uncaptured remainder of a hold
      description: |
        Release handles cancellation, rejection, withdrawal, failure and expiry
        before capture. It is not a refund. Captured money uses createRefund.
      parameters:
        - $ref: '#/components/parameters/HoldRef'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/ReleaseHoldRequest'}
      responses:
        '200':
          description: Hold after release or idempotent replay
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Hold'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/reservation-debits:
    post:
      tags: [Transactions]
      operationId: createReservationDebit
      summary: Capture an approved local FundReservation with one provider debit
      description: |
        Fallback only. Before this call, the business API locks the active
        FundReservation, validates fundReservationVersion, fetches a fresh
        providerBalanceMinor and atomically revalidates reservedMinor and
        availableMinor. Missing binding, stale version and unbound ORDER/GIFT
        debit attempts are rejected before contacting the provider.
      x-required-funding-mode: LOCAL_RESERVATION_FALLBACK
      x-prohibits-direct-order-gift-debit: true
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateReservationDebitRequest'}
      responses:
        '200':
          description: Normalized fallback debit
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Transaction'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/refunds:
    post:
      tags: [Transactions]
      operationId: createRefund
      summary: Create one idempotent refund after capture
      description: |
        Refunds a successful hold capture or fallback debit. Cancellation before
        capture releases instead. Successful and unresolved refunds cannot exceed
        the captured amount; original facts remain immutable.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/CreateRefundRequest'}
      responses:
        '200':
          description: Normalized refund
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Transaction'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/transactions/{lookupValue}:
    get:
      tags: [Transactions]
      operationId: getTransaction
      summary: Resolve a fallback debit or refund
      parameters:
        - $ref: '#/components/parameters/TransactionLookupValue'
        - $ref: '#/components/parameters/TransactionLookupType'
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      responses:
        '200':
          description: Current normalized transaction
          content:
            application/json:
              schema: {$ref: '#/components/schemas/Transaction'}
        default: {$ref: '#/components/responses/AdapterFailure'}

  /adapter/v1/webhooks:verify:
    post:
      tags: [Webhooks]
      operationId: verifyWebhook
      summary: Verify and normalize a provider webhook
      description: |
        Verification runs against exact raw bytes before parsing or mutation.
        Normalized events cover hold create/update/capture/release/expiry,
        fallback debit and refund states.
      parameters:
        - $ref: '#/components/parameters/RequestId'
        - $ref: '#/components/parameters/MockScenario'
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/VerifyWebhookRequest'}
      responses:
        '200':
          description: Verified provider event
          content:
            application/json:
              schema: {$ref: '#/components/schemas/VerifiedWebhook'}
        default: {$ref: '#/components/responses/AdapterFailure'}

components:
  securitySchemes:
    AdapterServiceToken:
      type: http
      scheme: bearer
      bearerFormat: opaque-service-token

  parameters:
    ExternalUserId:
      name: externalUserId
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 200}
    HoldRef:
      name: holdRef
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 200}
    HoldLookupValue:
      name: lookupValue
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 200}
    HoldLookupType:
      name: lookupType
      in: query
      required: true
      schema: {$ref: '#/components/schemas/HoldLookupType'}
    TransactionLookupValue:
      name: lookupValue
      in: path
      required: true
      schema: {type: string, minLength: 1, maxLength: 200}
    TransactionLookupType:
      name: lookupType
      in: query
      required: true
      schema: {$ref: '#/components/schemas/TransactionLookupType'}
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 200
        pattern: '^[A-Za-z0-9:_-]+$'
    RequestId:
      name: X-Request-Id
      in: header
      required: true
      schema: {type: string, minLength: 8, maxLength: 100}
    MockScenario:
      name: X-Mock-Scenario
      in: header
      required: false
      schema: {$ref: '#/components/schemas/MockScenario'}

  schemas:
    Currency:
      type: string
      pattern: '^[A-Z]{3}$'
      examples: [CNY]
    Money:
      type: object
      additionalProperties: false
      required: [amountMinor, currency]
      properties:
        amountMinor: {type: integer, format: int64, minimum: 0}
        currency: {$ref: '#/components/schemas/Currency'}
    PositiveMoney:
      type: object
      additionalProperties: false
      required: [amountMinor, currency]
      properties:
        amountMinor: {type: integer, format: int64, minimum: 1}
        currency: {$ref: '#/components/schemas/Currency'}

    ProviderCapabilities:
      type: object
      additionalProperties: false
      required: [providerKey, discoveredAt, nativeHold, fallbackDebit, refund, webhook]
      properties:
        providerKey: {type: string, pattern: '^[a-z][a-z0-9_-]{2,63}$'}
        discoveredAt: {type: string, format: date-time}
        nativeHold: {$ref: '#/components/schemas/NativeHoldCapability'}
        fallbackDebit: {$ref: '#/components/schemas/FallbackDebitCapability'}
        refund: {$ref: '#/components/schemas/RefundCapability'}
        webhook: {$ref: '#/components/schemas/WebhookCapability'}
    NativeHoldCapability:
      type: object
      additionalProperties: false
      required: [supported, create, capture, release, get, idempotentWrites, lookupByIdempotencyKey, partialCapture, partialRelease, minimumTtlSeconds, maximumTtlSeconds]
      properties:
        supported: {type: boolean}
        create: {type: boolean}
        capture: {type: boolean}
        release: {type: boolean}
        get: {type: boolean}
        idempotentWrites: {type: boolean}
        lookupByIdempotencyKey: {type: boolean}
        partialCapture: {type: boolean}
        partialRelease: {type: boolean}
        minimumTtlSeconds: {type: [integer, 'null'], minimum: 1}
        maximumTtlSeconds: {type: [integer, 'null'], minimum: 1}
    FallbackDebitCapability:
      type: object
      additionalProperties: false
      required: [supported, idempotentWrites, lookupByIdempotencyKey]
      properties:
        supported: {type: boolean}
        idempotentWrites: {type: boolean}
        lookupByIdempotencyKey: {type: boolean}
    RefundCapability:
      type: object
      additionalProperties: false
      required: [full, partial, idempotentWrites, lookupByIdempotencyKey]
      properties:
        full: {type: boolean}
        partial: {type: boolean}
        idempotentWrites: {type: boolean}
        lookupByIdempotencyKey: {type: boolean}
    WebhookCapability:
      type: object
      additionalProperties: false
      required: [supported, stableEventId, eventTypes]
      properties:
        supported: {type: boolean}
        stableEventId: {type: boolean}
        eventTypes:
          type: array
          uniqueItems: true
          items: {$ref: '#/components/schemas/ProviderEventType'}

    ResolveUserRequest:
      type: object
      additionalProperties: false
      required: [credentialType, credentialValue]
      properties:
        credentialType: {type: string, enum: [ONE_TIME_CODE, EXTERNAL_USER_ID]}
        credentialValue: {type: string, minLength: 1, maxLength: 500, writeOnly: true, x-sensitive: true}
        expectedCurrency: {$ref: '#/components/schemas/Currency'}
    ResolvedUser:
      type: object
      additionalProperties: false
      required: [externalUserId, verified, accountStatus, resolvedAt]
      properties:
        externalUserId: {type: string, minLength: 1, maxLength: 200}
        displayName: {type: [string, 'null'], maxLength: 200}
        verified: {const: true}
        accountStatus: {type: string, enum: [ACTIVE, INACTIVE, SUSPENDED, UNKNOWN]}
        resolvedAt: {type: string, format: date-time}
    ProviderBalanceSnapshot:
      type: object
      additionalProperties: false
      required: [externalUserId, providerBalanceMinor, currency, fetchedAt, stale]
      properties:
        externalUserId: {type: string, minLength: 1, maxLength: 200}
        providerBalanceMinor:
          type: integer
          format: int64
          minimum: 0
          description: Provider-reported balance; never named availableMinor.
        currency: {$ref: '#/components/schemas/Currency'}
        fetchedAt: {type: string, format: date-time}
        providerAsOf: {type: [string, 'null'], format: date-time}
        stale: {type: boolean}

    BusinessSource:
      type: string
      enum: [ORDER, GIFT]
    FundReservationBinding:
      type: object
      additionalProperties: false
      required: [fundReservationId, fundReservationVersion]
      properties:
        fundReservationId: {type: string, format: uuid}
        fundReservationVersion: {type: integer, minimum: 1}
    CreateHoldRequest:
      type: object
      additionalProperties: false
      required: [fundReservationId, fundReservationVersion, externalUserId, amount, businessSource, businessReference, expiresAt]
      properties:
        fundReservationId: {type: string, format: uuid}
        fundReservationVersion: {type: integer, minimum: 1}
        externalUserId: {type: string, minLength: 1, maxLength: 200}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
        businessSource: {$ref: '#/components/schemas/BusinessSource'}
        businessReference: {type: string, format: uuid}
        expiresAt: {type: string, format: date-time}
        metadata: {$ref: '#/components/schemas/TransactionMetadata'}
    CaptureHoldRequest:
      type: object
      additionalProperties: false
      required: [fundReservationId, fundReservationVersion, amount, businessReference]
      properties:
        fundReservationId: {type: string, format: uuid}
        fundReservationVersion: {type: integer, minimum: 1}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
        businessReference: {type: string, format: uuid}
        reasonCode: {type: string, pattern: '^[A-Z][A-Z0-9_]{2,63}$'}
    ReleaseHoldRequest:
      type: object
      additionalProperties: false
      required: [fundReservationId, fundReservationVersion, reasonCode]
      properties:
        fundReservationId: {type: string, format: uuid}
        fundReservationVersion: {type: integer, minimum: 1}
        reasonCode: {type: string, pattern: '^[A-Z][A-Z0-9_]{2,63}$'}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
    HoldLookupType:
      type: string
      enum: [PROVIDER_HOLD_REF, IDEMPOTENCY_KEY]
    HoldStatus:
      type: string
      enum: [UNKNOWN, PENDING, ACTIVE, PARTIALLY_CAPTURED, CAPTURED, RELEASED, EXPIRED, FAILED]
    Hold:
      type: object
      additionalProperties: false
      required: [status, idempotencyKey, fundReservationId, fundReservationVersion, externalUserId, businessSource, businessReference, amount, capturedAmount, releasedAmount, remainingAmount, expiresAt, observedAt]
      properties:
        status: {$ref: '#/components/schemas/HoldStatus'}
        idempotencyKey: {type: string, minLength: 16, maxLength: 200}
        fundReservationId: {type: string, format: uuid}
        fundReservationVersion: {type: integer, minimum: 1}
        externalUserId: {type: string, minLength: 1, maxLength: 200}
        businessSource: {$ref: '#/components/schemas/BusinessSource'}
        businessReference: {type: string, format: uuid}
        holdRef: {type: [string, 'null'], maxLength: 200}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
        capturedAmount: {$ref: '#/components/schemas/Money'}
        releasedAmount: {$ref: '#/components/schemas/Money'}
        remainingAmount: {$ref: '#/components/schemas/Money'}
        expiresAt: {type: string, format: date-time}
        providerStatus: {type: [string, 'null'], maxLength: 100}
        observedAt: {type: string, format: date-time}
        failure:
          anyOf:
            - {$ref: '#/components/schemas/OperationFailure'}
            - {type: 'null'}
      x-invariants:
        - captured-plus-released-plus-remaining-equals-original-amount
        - all-money-values-use-the-same-currency

    CreateReservationDebitRequest:
      type: object
      additionalProperties: false
      required: [fundReservationId, fundReservationVersion, externalUserId, amount, businessSource, businessReference]
      properties:
        fundReservationId: {type: string, format: uuid}
        fundReservationVersion: {type: integer, minimum: 1}
        externalUserId: {type: string, minLength: 1, maxLength: 200}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
        businessSource: {$ref: '#/components/schemas/BusinessSource'}
        businessReference: {type: string, format: uuid}
        metadata: {$ref: '#/components/schemas/TransactionMetadata'}
      x-business-api-preconditions:
        - mode-is-LOCAL_RESERVATION_FALLBACK
        - reservation-is-active-and-unexpired
        - fundReservationVersion-matches-locked-row
        - fresh-providerBalanceMinor-revalidated
        - no-provider-balance-deficit
    CreateRefundRequest:
      type: object
      additionalProperties: false
      required: [originalTransactionRef, amount, reasonCode, businessReference]
      properties:
        originalTransactionRef: {type: string, minLength: 1, maxLength: 200}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
        reasonCode: {type: string, pattern: '^[A-Z][A-Z0-9_]{2,63}$'}
        businessReference: {type: string, format: uuid}
        metadata: {$ref: '#/components/schemas/TransactionMetadata'}
    TransactionMetadata:
      type: object
      additionalProperties: {type: [string, number, boolean, 'null']}
      maxProperties: 20
    TransactionLookupType:
      type: string
      enum: [PROVIDER_REF, IDEMPOTENCY_KEY]
    TransactionKind:
      type: string
      enum: [FALLBACK_DEBIT, REFUND]
    TransactionStatus:
      type: string
      enum: [UNKNOWN, PENDING, SUCCEEDED, FAILED]
    Transaction:
      type: object
      additionalProperties: false
      required: [kind, status, idempotencyKey, amount, businessReference, observedAt]
      properties:
        kind: {$ref: '#/components/schemas/TransactionKind'}
        status: {$ref: '#/components/schemas/TransactionStatus'}
        idempotencyKey: {type: string, minLength: 16, maxLength: 200}
        fundReservationId: {type: [string, 'null'], format: uuid}
        fundReservationVersion: {type: [integer, 'null'], minimum: 1}
        businessSource:
          anyOf:
            - {$ref: '#/components/schemas/BusinessSource'}
            - {type: 'null'}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
        businessReference: {type: string, format: uuid}
        providerRef: {type: [string, 'null'], maxLength: 200}
        originalProviderRef: {type: [string, 'null'], maxLength: 200}
        providerStatus: {type: [string, 'null'], maxLength: 100}
        observedAt: {type: string, format: date-time}
        providerOccurredAt: {type: [string, 'null'], format: date-time}
        failure:
          anyOf:
            - {$ref: '#/components/schemas/OperationFailure'}
            - {type: 'null'}
    OperationFailure:
      type: object
      additionalProperties: false
      required: [code, retryable, safeMessage]
      properties:
        code: {$ref: '#/components/schemas/ErrorCode'}
        retryable: {type: boolean}
        safeMessage: {type: string, maxLength: 200}

    VerifyWebhookRequest:
      type: object
      additionalProperties: false
      required: [headers, rawBodyBase64, receivedAt]
      properties:
        headers: {type: object, additionalProperties: {type: string}, x-sensitive: true}
        rawBodyBase64: {type: string, contentEncoding: base64, writeOnly: true, x-sensitive: true}
        receivedAt: {type: string, format: date-time}
    VerifiedWebhook:
      type: object
      additionalProperties: false
      required: [verified, event]
      properties:
        verified: {const: true}
        event: {$ref: '#/components/schemas/ProviderEvent'}
    ProviderEventType:
      type: string
      enum: [HOLD_CREATED, HOLD_UPDATED, HOLD_CAPTURED, HOLD_RELEASED, HOLD_EXPIRED, DEBIT_UPDATED, REFUND_UPDATED]
    ProviderEvent:
      oneOf:
        - {$ref: '#/components/schemas/HoldProviderEvent'}
        - {$ref: '#/components/schemas/TransactionProviderEvent'}
    HoldProviderEvent:
      type: object
      additionalProperties: false
      required: [eventId, resourceType, eventType, holdRef, holdStatus, occurredAt]
      properties:
        eventId: {type: string, minLength: 1, maxLength: 200}
        resourceType: {const: HOLD}
        eventType: {type: string, enum: [HOLD_CREATED, HOLD_UPDATED, HOLD_CAPTURED, HOLD_RELEASED, HOLD_EXPIRED]}
        holdRef: {type: string, minLength: 1, maxLength: 200}
        idempotencyKey: {type: [string, 'null'], maxLength: 200}
        holdStatus: {$ref: '#/components/schemas/HoldStatus'}
        amount:
          anyOf:
            - {$ref: '#/components/schemas/Money'}
            - {type: 'null'}
        expiresAt: {type: [string, 'null'], format: date-time}
        occurredAt: {type: string, format: date-time}
        providerSequence: {type: [integer, 'null'], minimum: 0}
        providerStatus: {type: [string, 'null'], maxLength: 100}
    TransactionProviderEvent:
      type: object
      additionalProperties: false
      required: [eventId, resourceType, eventType, providerRef, transactionStatus, occurredAt]
      properties:
        eventId: {type: string, minLength: 1, maxLength: 200}
        resourceType: {const: TRANSACTION}
        eventType: {type: string, enum: [DEBIT_UPDATED, REFUND_UPDATED]}
        providerRef: {type: string, minLength: 1, maxLength: 200}
        idempotencyKey: {type: [string, 'null'], maxLength: 200}
        transactionStatus: {$ref: '#/components/schemas/TransactionStatus'}
        amount:
          anyOf:
            - {$ref: '#/components/schemas/Money'}
            - {type: 'null'}
        occurredAt: {type: string, format: date-time}
        providerSequence: {type: [integer, 'null'], minimum: 0}
        providerStatus: {type: [string, 'null'], maxLength: 100}

    ErrorCode:
      type: string
      description: Public codes align to the unified OpenAPI; provider-only codes are mapped before response.
      enum: [VALIDATION_ERROR, RESOURCE_NOT_FOUND, CONFLICT, IDEMPOTENCY_CONFLICT, BUSINESS_RULE_VIOLATION, SERVICE_NOT_AVAILABLE, INSUFFICIENT_FUNDS, INSUFFICIENT_AVAILABLE_BALANCE, RESERVATION_CONFLICT, CANCELLATION_PREVIEW_STALE, AUTOMATION_STATE_CONFLICT, PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, SIGNATURE_INVALID, REPLAY_REJECTED, AUTHENTICATION_FAILED, RATE_LIMITED, SCHEMA_MISMATCH, UNKNOWN_PROVIDER_ERROR, REFUND_AMOUNT_EXCEEDED]
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [field, reason]
      properties:
        field: {type: string, maxLength: 100}
        reason: {type: string, maxLength: 300}
    AdapterError:
      type: object
      additionalProperties: false
      required: [code, message, retryable, requestId, details]
      properties:
        code: {$ref: '#/components/schemas/ErrorCode'}
        message: {type: string, maxLength: 200}
        retryable: {type: boolean}
        requestId: {type: string}
        details: {type: array, maxItems: 20, items: {$ref: '#/components/schemas/ErrorDetail'}}
        providerHttpStatus: {type: [integer, 'null'], minimum: 100, maximum: 599}
    MockScenario:
      type: string
      enum: [CAPABILITIES_NATIVE_HOLD, CAPABILITIES_LOCAL_FALLBACK, SUCCESS, USER_NOT_FOUND, INSUFFICIENT_AVAILABLE_BALANCE, INSUFFICIENT_FUNDS, HOLD_PENDING_THEN_ACTIVE, HOLD_EXPIRES, HOLD_CAPTURE_SUCCESS, HOLD_PARTIAL_CAPTURE, HOLD_RELEASE_SUCCESS, HOLD_TIMEOUT_AFTER_COMMIT, FALLBACK_DEBIT_SUCCESS, FALLBACK_DEBIT_TIMEOUT_AFTER_COMMIT, RESERVATION_BINDING_MISSING, RESERVATION_VERSION_CONFLICT, OUT_OF_BAND_SPEND_DEFICIT, PROVIDER_FAILURE, RATE_LIMITED, CURRENCY_MISMATCH, REFUND_SUCCESS, REFUND_PENDING_THEN_SUCCESS, REFUND_AMOUNT_EXCEEDED, DUPLICATE_WEBHOOK, OUT_OF_ORDER_WEBHOOK, HOLD_EXPIRED_WEBHOOK, INVALID_SIGNATURE, REPLAYED_WEBHOOK]

  responses:
    AdapterFailure:
      description: Normalized adapter or provider failure
      content:
        application/json:
          schema: {$ref: '#/components/schemas/AdapterError'}
          example:
            code: PROVIDER_UNAVAILABLE
            message: Provider is temporarily unavailable.
            retryable: true
            requestId: req_example
            details: []
            providerHttpStatus: 503

