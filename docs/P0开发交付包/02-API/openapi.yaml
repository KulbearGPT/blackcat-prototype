        type: string
        enum:
          - L2_GIFT_APPROVAL_LIMIT_MINOR
          - L2_REFUND_LIMIT_MINOR
          - L4_DIRECT_EXECUTION_THRESHOLD_MINOR
          - DISPATCH_TIMEOUT_MINUTES
          - PLAYER_START_GRACE_MINUTES
          - CUSTOMER_NO_SHOW_REVIEW_MINUTES
          - ORDER_CONFIRMATION_TIMEOUT_MINUTES
          - GIFT_REVIEW_REMINDER_MINUTES
          - PROMOTER_FIRST_PURCHASE_FIXED_MINOR
          - PROMOTER_FIRST_PURCHASE_RATE_BPS
          - PLAYER_LIFETIME_ORDER_RATE_BPS
          - PLAYER_LIFETIME_GIFT_RATE_BPS
          - STEP_UP_VALIDITY_MINUTES
      example: L2_GIFT_APPROVAL_LIMIT_MINOR
    ChallengeId:
      name: challengeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EnrollmentId:
      name: enrollmentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProviderKey:
      name: providerKey
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z][a-z0-9_-]{1,31}$'
      description: Configured neutral adapter key, not a supplier-specific field.
      example: primary-balance

  requestBodies:
    CreateBindingBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CreateBindingRequest'
