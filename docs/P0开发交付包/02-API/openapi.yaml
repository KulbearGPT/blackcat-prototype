  /api/v1/admin/gift-requests/{giftRequestId}/approve:
    post:
      tags: [Gifts, Finance]
      operationId: approveGiftRequest
      summary: Approve a verified gift and capture its reservation exactly once
      description: |
        Approval never accepts or recalculates an amount from the client. The API
        captures the existing FundReservation. With a local reservation fallback it
        first re-reads providerBalanceMinor and executes createReservationDebit under the stable
        key debit:gift:{giftRequestId}:v1. Capture, consumption and Outbox creation
        are coordinated so message retries cannot repeat the debit.
      security:
        - DashboardSession: []
        - BotServiceToken: []
      x-required-permissions: [gift.approve]
      x-minimum-staff-level: L2_SUPERVISOR
      x-amount-policy: L2_UP_TO_200000_CNY_MINOR; L3_ABOVE; AT_OR_ABOVE_500000_REQUIRES_L4_DIRECT_EXECUTION
      x-actor-context:
        acceptedSources: [DASHBOARD, DISCORD_BOT]
        resolution: dashboard-session-or-trusted-bot-actor
      x-provider-operations: [captureHold, getProviderBalance, createReservationDebit]
      x-provider-idempotency-key: debit:gift:{giftRequestId}:v1
      x-fund-effect: capture-active-gift-reservation
      parameters:
        - $ref: '#/components/parameters/GiftRequestId'
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/ApproveGiftBody'
