openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Discord Companion Service Unified Business API
  version: 0.1.0-p0
  summary: Shared P0 business API for Sapphire Bot and React Dashboard
  description: |
    Planned P0 delivery contract for the single business API used by both the
    Sapphire Discord Bot and React Dashboard; it does not claim the product is
    already implemented. Only this API accesses PostgreSQL. External systems are
    limited to normalized user resolution, balance, debit, refund and webhook
    responsibilities. Money is always represented as integer minor units plus
    an ISO 4217 currency code. All order flows are immediate; scheduling is out
    of scope.
servers:
  - url: /
    description: Same-origin P0 API; deployments supply their own origin
tags:
  - name: Health
    description: Process liveness and dependency readiness.
  - name: Identity
    description: Discord-to-external account binding.
  - name: Catalog
    description: Customer-facing service and gift catalogs and estimates.
  - name: Orders
    description: Immediate order lifecycle shared by Bot and Dashboard.
  - name: Dispatch
    description: Automatic dispatch and atomic player acceptance.
  - name: Players
    description: Player eligibility, availability and presence signals.
  - name: Gifts
    description: Gift request, review, debit outcome and announcement recovery.
  - name: SelfService
    description: Private current-user balance, consumption and commission views.
  - name: Dashboard
    description: Staff operations data exposed through the shared API.
  - name: StaffTasks
    description: Staff takeover, claim, verification and resolution.
  - name: AdminOrders
    description: Staff-scoped order search, refund, resolution and reassignment.
  - name: AdminUsers
    description: Redacted user operations views and non-destructive status control.
  - name: AdminPlayers
    description: Player review, tags and operational status management.
  - name: AdminCatalog
    description: Versioned P0 service and gift catalog administration.
  - name: Finance
    description: Reservations, refunds, referral commissions and player earnings.
  - name: ReferralAttribution
    description: Confidential referral attribution administration with redacted list boundaries.
  - name: Approvals
    description: Minimum-level approval workflow with higher-level direct execution.
  - name: Audit
    description: Immutable, scope-filtered audit records.
  - name: Jobs
    description: Failed outbox job visibility and display-only retries.
  - name: Access
    description: Staff capabilities, Role mapping, MFA and session revocation.
  - name: BotConfig
    description: Guild-scoped Bot configuration validation, versioned updates and delivery checks.
  - name: Internal
    description: Restricted Bot and system worker integration endpoints.
  - name: Webhooks
    description: Neutral provider webhook verification and normalized outcomes.
x-api-boundary:
  databaseAccess: api-only
  sharedClients: [SAPPHIRE_BOT, REACT_DASHBOARD]
  externalResponsibilities: [USER_RESOLUTION, BALANCE, DEBIT, REFUND, WEBHOOK_VERIFICATION]
  localFacts:
    - USER_MAPPING
    - ORDER
    - DISPATCH
    - GIFT
    - FUND_RESERVATION
    - REFERRAL_ATTRIBUTION
    - COMMISSION
    - CONSUMPTION
    - PLAYER_EARNING
    - STAFF_TASK
    - APPROVAL
    - AUDIT
    - GUILD_BOT_CONFIG
x-rbac-inheritance: CUMULATIVE
x-rbac-level-order: [L1_SUPPORT, L2_SUPERVISOR, L3_OPERATIONS, L4_ADMIN_OWNER]
x-approval-execution: MINIMUM_LEVEL_DIRECT
x-money-policy:
  representation: minor-units-integer
  currency: ISO-4217-uppercase
  prototypeCurrency: CNY
x-unified-spend-policy:
  rule: all-order-and-gift-spend-must-enter-through-this-api
  bypassForbidden: true
  providerNativeHoldPreferred: true
  localReservationFallbackRequiresFreshProviderBalance: true
x-fund-reservation-policy:
  derivedBalanceFormula: availableMinor = providerBalanceMinor - reservedMinor
  activeStatuses: [PENDING, ACTIVE, DISPUTED, PARTIALLY_SETTLED]
  orderLifecycle:
    reserveOn: ORDER_SUBMIT
    captureOn: ORDER_COMPLETE
    dispatchTimeout: KEEP_RESERVATION_AND_OFFER_CONTINUE_OR_CANCEL
    releaseOn: [USER_CANCELLED, RESERVATION_EXPIRED, REJECTED, FAILED]
  giftLifecycle:
    reserveOn: GIFT_REQUEST_CREATE
    captureOn: GIFT_APPROVAL
    releaseOn: [WITHDRAWN, REJECTED, EXPIRED, FAILED]
  partialResolution: capture-decided-amount-and-release-remainder
  postCaptureCorrection: append-refund-or-adjustment-never-release-captured-reservation
x-concurrency-policy:
  mutableWritesRequireExpectedVersion: true
  reservationMutationsAreAtomicWithBusinessTransition: true
  stableIdempotencyRequiredForWrites: true
  staleVersionError: CONFLICT
  changedFingerprintError: IDEMPOTENCY_CONFLICT
x-referral-confidentiality-policy:
  programs: [PROMOTER_FIRST_PURCHASE, PLAYER_LIFETIME]
  oneActiveAttributionPerReferredCustomer: true
  programsMutuallyExclusive: true
  referredCustomerForbiddenFields: [source, beneficiary, programType, rate, amount, status]
  beneficiarySelfViewMasksSourceCustomer: true
  confidentialDetailMinimumLevel: L3_OPERATIONS
  confidentialReadsAudited: true
x-order-policy:
  type: IMMEDIATE_ONLY
  maxActiveOrdersPerCustomer: 1
  maxActiveOrdersPerPlayer: 1
x-role-policy:
  fixedLevels: [L1_SUPPORT, L2_SUPERVISOR, L3_OPERATIONS, L4_ADMIN_OWNER]
  inheritance: higher-level-includes-all-lower-level-execution-permissions
  authorizationRule: actor-rank-greater-than-or-equal-to-required-rank
  l1DestructiveOrFinancialExecution: forbidden
  l2GiftApprovalLimit:
    amountMinor: 200000
    currency: CNY
  l2RefundLimit:
    amountMinor: 50000
    currency: CNY
  highValueDirectExecution:
    amountMinor: 500000
    currency: CNY
    minimumLevel: L4_ADMIN_OWNER
    sameActorMayInitiateAndExecute: true
    separateReviewerRequired: false
  safeguards: [REASON_REQUIRED, STEP_UP_REQUIRED, IMMUTABLE_AUDIT]
x-record-retention-policy:
  hardDeleteForbidden:
    - orders
    - orderEvents
    - orderResolutions
    - externalTransactions
    - consumptions
    - gifts
    - commissions
    - playerEarnings
    - refunds
    - auditLogs
    - guildBotConfigEvents

paths:
  /health:
    get:
      tags: [Health]
      operationId: getHealth
      summary: Check process liveness
      security: []
      x-required-permissions: []
      x-actor-context:
        source: NONE
        resolution: not-applicable
      responses:
        '200':
          $ref: '#/components/responses/HealthResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /ready:
    get:
      tags: [Health]
      operationId: getReadiness
      summary: Check API dependency readiness
      security: []
      x-required-permissions: []
      x-actor-context:
        source: NONE
        resolution: not-applicable
      responses:
        '200':
          $ref: '#/components/responses/ReadinessResponse'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/bindings:
    post:
      tags: [Identity]
      operationId: createBinding
      x-operation-aliases: [bindExternalAccount]
      summary: Bind the current Discord actor to an external account
      description: The one-time credential is verified through the neutral payment adapter and is never persisted or logged.
      security:
        - BotServiceToken: []
      x-required-permissions: [account.bind]
      x-actor-context:
        acceptedSources: [DISCORD_BOT]
        resolution: trusted-discord-headers-after-bot-authentication
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserIdRequired'
        - $ref: '#/components/parameters/ActorGuildIdRequired'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/CreateBindingBody'
      responses:
        '201':
          $ref: '#/components/responses/BindingResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
        '503':
          $ref: '#/components/responses/ProviderUnavailable'

  /api/v1/me:
    get:
      tags: [SelfService]
      operationId: getCurrentUser
      x-operation-aliases: [getMyServiceCenter]
      summary: Get the current actor service-center summary
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [account.self.read]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
      responses:
        '200':
          $ref: '#/components/responses/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '503':
          $ref: '#/components/responses/ProviderUnavailable'

  /api/v1/me/balance:
    get:
      tags: [SelfService]
      operationId: getCurrentBalance
      x-operation-aliases: [getMyBalance]
      summary: Get provider balance, active reservations and derived available balance
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [balance.self.read]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
      responses:
        '200':
          $ref: '#/components/responses/BalanceResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '503':
          $ref: '#/components/responses/ProviderUnavailable'
        '504':
          $ref: '#/components/responses/ProviderTimeout'

  /api/v1/me/consumptions:
    get:
      tags: [SelfService]
      operationId: listCurrentUserConsumptions
      x-operation-aliases: [listMyConsumptions]
      summary: List the current user's order, gift and reversal consumption records
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [consumption.self.read]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          $ref: '#/components/responses/ConsumptionPageResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /api/v1/me/commissions:
    get:
      tags: [SelfService]
      operationId: listCurrentUserCommissions
      x-operation-aliases: [listMyCommissions]
      summary: List commissions where the current actor is the beneficiary
      description: |
        Returns only records whose beneficiary is the current actor. Source
        customers are masked and the response DTO contains no source customer ID,
        beneficiary ID, attribution ID or configured rate. It never reveals a
        referred customer's own attribution merely because that customer calls /me.
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [commission.self.read]
      x-response-data-policy: beneficiary-only-with-masked-source-customer
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
      responses:
        '200':
          $ref: '#/components/responses/CurrentCommissionPageResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /api/v1/me/staff-tasks:
    get:
      tags: [CurrentUser, StaffTasks]
      operationId: listCurrentUserStaffTasks
      summary: List the current user's redacted support-task progress
      description: Returns only tasks whose customer is the current actor; internal notes, staff-only evidence and restricted referral fields are always omitted.
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [account.self.read]
      x-authorization-rules: [owner-only, self-safe-redaction]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/PageLimit'
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
      responses:
        '200':
          $ref: '#/components/responses/StaffTaskPageResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /api/v1/services:
    get:
      tags: [Catalog]
      operationId: listServices
      x-operation-aliases: [listServiceCatalog]
      summary: List enabled services with customer prices only
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [service.read]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - name: game
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
        - name: region
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
      responses:
        '200':
          $ref: '#/components/responses/ServiceListResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /api/v1/services/{serviceCatalogId}/estimate:
    post:
      tags: [Catalog]
      operationId: estimateService
      summary: Estimate an immediate service without creating or mutating an order
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [service.estimate]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ServiceCatalogId'
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/EstimateServiceBody'
      responses:
        '200':
          $ref: '#/components/responses/EstimateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '422':
          $ref: '#/components/responses/ServiceNotAvailable'

  /api/v1/gifts:
    get:
      tags: [Gifts]
      operationId: listGifts
      x-operation-aliases: [listGiftCatalog]
      summary: List enabled gift catalog items
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [gift.read]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
      responses:
        '200':
          $ref: '#/components/responses/GiftCatalogResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'

  /api/v1/orders:
    post:
      tags: [Orders]
      operationId: createOrder
      summary: Create or return the current customer's immediate order draft
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [order.create]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/CreateOrderBody'
      responses:
        '201':
          $ref: '#/components/responses/OrderResponse'
        '200':
          description: Existing active order returned idempotently
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderEnvelope'
              example:
                requestId: req_order_existing
                data:
                  id: 8f0de2a5-a8d5-4c24-b32c-4b6673acb510
                  status: ACCEPTED
                  version: 4
                  orderType: IMMEDIATE
                  currency: CNY
                  amountMinor: 12000
                  playerEarningMinor: 8000
                  fundReservation: {reservationId: 3ad7c462-b466-4c03-8352-a67b032b1691, amountMinor: 12000, capturedMinor: 0, releasedMinor: 0, currency: CNY, status: ACTIVE, version: 1, expiresAt: '2026-07-15T17:00:00Z'}
                  readiness: {customer: NOT_READY, player: NOT_READY, bothReady: false, readyDeadlineAt: '2026-07-15T16:20:00Z', startedAt: null, staffTaskId: null}
                  automation: {state: RUNNING, pausedByStaffId: null, reasonCode: null, pausedAt: null, resumedAt: null}
                  channelSpec:
                    channelId: '120000000000000001'
                    panelMessageId: '120000000000000002'
                    voiceChannelId: null
                  createdAt: '2026-07-15T16:00:00Z'
                  updatedAt: '2026-07-15T16:10:00Z'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '409':
          $ref: '#/components/responses/ConflictError'

  /api/v1/orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Get an order visible to the current actor
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [order.read]
      x-authorization-rules: [owner-or-assigned-player-or-staff-scope]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
      responses:
        '200':
          $ref: '#/components/responses/OrderResponse'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Orders]
      operationId: updateOrder
      x-operation-aliases: [updateOrderDraft]
      summary: Update an immediate order draft and refresh its price preview
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [order.update]
      x-authorization-rules: [owner-only, draft-only, server-calculates-prices]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/UpdateOrderBody'
      responses:
        '200':
          $ref: '#/components/responses/OrderResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ServiceNotAvailable'

  /api/v1/orders/{orderId}/estimate:
    post:
      tags: [Orders]
      operationId: estimateOrder
      summary: Recalculate a draft estimate without changing order state
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [order.estimate]
      x-authorization-rules: [owner-only, draft-only]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/EstimateOrderBody'
      responses:
        '200':
          $ref: '#/components/responses/EstimateResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/ServiceNotAvailable'

  /api/v1/orders/{orderId}/submit:
    post:
      tags: [Orders]
      operationId: submitOrder
      summary: Atomically reserve funds and enter pending dispatch
      description: |
        Re-reads the provider balance, calculates reservedMinor from active
        FundReservation rows, and creates the order reservation in the same
        transaction that moves the order from DRAFT to PENDING_DISPATCH. No
        consumption or debit is created until order completion.
      security:
        - BotServiceToken: []
        - DashboardSession: []
      x-required-permissions: [order.submit]
      x-authorization-rules: [owner-only, draft-only, fresh-provider-balance-required, sufficient-available-balance]
      x-actor-context:
        acceptedSources: [DISCORD_BOT, DASHBOARD]
        resolution: bot-discord-headers-or-dashboard-session
      x-provider-operations: [getProviderBalance, createHold]
      x-fund-effect: create-active-order-reservation-atomically
      parameters:
        - $ref: '#/components/parameters/OrderId'
        - $ref: '#/components/parameters/ClientSource'
        - $ref: '#/components/parameters/ActorDiscordUserId'
        - $ref: '#/components/parameters/ActorGuildId'
        - $ref: '#/components/parameters/DiscordInteractionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        $ref: '#/components/requestBodies/SubmitOrderBody'
      responses:
        '200':
          $ref: '#/components/responses/OrderReservationResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/AuthenticationError'
        '403':
          $ref: '#/components/responses/PermissionError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/InsufficientAvailableBalance'
        '503':
          $ref: '#/components/responses/ProviderUnavailable'
        '504':
          $ref: '#/components/responses/ProviderTimeout'

  /api/v1/orders/{orderId}/cancellation-preview:
