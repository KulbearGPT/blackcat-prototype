    patch:
      tags: [BotConfig]
      operationId: updateBotConfig
      summary: Apply a validated Bot configuration change at an expected version
      description: |
        The API authorizes every changed field. L3 may update operational fields;
        Role mappings require L4 and bot_config.security.manage. The current row
        update and append-only event insert commit in one transaction. A valid,
        unexpired validationToken bound to the actor, Guild, version, normalized
        changes and reason is mandatory; direct PATCH without preview is rejected.
