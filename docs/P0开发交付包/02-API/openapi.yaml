        staff_l4_role_id: {$ref: '#/components/schemas/DiscordSnowflake'}
        staff_notification_role_id:
          anyOf: [{$ref: '#/components/schemas/DiscordSnowflake'}, {type: 'null'}]
        operations_notification_role_id:
          anyOf: [{$ref: '#/components/schemas/DiscordSnowflake'}, {type: 'null'}]
        dispatch_timeout_minutes: {type: integer, minimum: 1, maximum: 30}
        dispatch_max_rounds: {type: integer, minimum: 1, maximum: 5}
        readiness_timeout_minutes: {type: integer, minimum: 1, maximum: 30}
        completion_confirmation_minutes: {type: integer, minimum: 5, maximum: 120}
        gift_review_reminder_minutes: {type: integer, minimum: 1, maximum: 60}
        channel_archive_after_completion_minutes: {type: integer, minimum: 0, maximum: 43200}
        gift_broadcast_template:
          type: string
          minLength: 1
          maxLength: 500
          pattern: '^(?:[^{}]|\{(?:sender_name|receiver_name|gift_name)\})+$'
          allOf:
            - pattern: '\{sender_name\}'
            - pattern: '\{receiver_name\}'
            - pattern: '\{gift_name\}'
        new_orders_enabled: {type: boolean}
        auto_dispatch_enabled: {type: boolean}
        gift_requests_enabled: {type: boolean}
        maintenance_notice: {type: boolean}
    BotConfigChangeSet:
      allOf:
        - $ref: '#/components/schemas/BotConfigFieldSet'
        - minProperties: 1
    BotConfigChangeRequest:
      type: object
      additionalProperties: false
      required: [guildId, expectedVersion, changes, reason]
      properties:
        guildId: {$ref: '#/components/schemas/DiscordSnowflake'}
        expectedVersion: {$ref: '#/components/schemas/Version'}
        changes: {$ref: '#/components/schemas/BotConfigChangeSet'}
        reason: {type: string, minLength: 3, maxLength: 1000}
    BotConfigUpdateRequest:
      type: object
      additionalProperties: false
      required: [guildId, expectedVersion, changes, reason, validationToken]
      properties:
        guildId: {$ref: '#/components/schemas/DiscordSnowflake'}
        expectedVersion: {$ref: '#/components/schemas/Version'}
        changes: {$ref: '#/components/schemas/BotConfigChangeSet'}
        reason: {type: string, minLength: 3, maxLength: 1000}
        validationToken:
          type: string
          minLength: 32
          maxLength: 2048
          description: Short-lived signed preview token bound to actor, Guild, expectedVersion, normalized changes and reason.
    BotConfigDeliveryTestRequest:
      type: object
      additionalProperties: false
      required: [guildId, expectedVersion, channelField, channelId, reason]
      properties:
        guildId: {$ref: '#/components/schemas/DiscordSnowflake'}
        expectedVersion: {$ref: '#/components/schemas/Version'}
        channelField: {$ref: '#/components/schemas/BotConfigChannelFieldName'}
        channelId: {$ref: '#/components/schemas/DiscordSnowflake'}
        reason: {type: string, minLength: 3, maxLength: 1000}
    BotConfigValidationIssue:
      type: object
      additionalProperties: false
      required: [field, code, message]
      properties:
        field:
          anyOf: [{$ref: '#/components/schemas/BotConfigFieldName'}, {type: 'null'}]
        code: {type: string, pattern: '^[A-Z][A-Z0-9_]{2,63}$'}
        message: {type: string, minLength: 1, maxLength: 300}
    BotConfigSnapshot:
      type: object
      additionalProperties: false
      required: [guildId, version, values, manageableFields, updatedByStaffId, updatedAt]
      properties:
        guildId: {$ref: '#/components/schemas/DiscordSnowflake'}
        version: {$ref: '#/components/schemas/Version'}
        values: {$ref: '#/components/schemas/BotConfigFieldSet'}
        manageableFields:
          type: array
          uniqueItems: true
          items: {$ref: '#/components/schemas/BotConfigFieldName'}
        updatedByStaffId:
          type: [string, 'null']
          format: uuid
        updatedAt: {type: string, format: date-time}
    BotConfigEnvelope:
      type: object
      additionalProperties: false
      required: [requestId, data]
      properties:
        requestId: {type: string}
        data: {$ref: '#/components/schemas/BotConfigSnapshot'}
    BotConfigValidationEnvelope:
      type: object
      additionalProperties: false
      required: [requestId, data]
      properties:
        requestId: {type: string}
        data:
          type: object
          additionalProperties: false
          required: [guildId, currentVersion, normalizedChanges, warnings, errors, mayApply, requiredPermissions, validationToken, validationExpiresAt]
          properties:
            guildId: {$ref: '#/components/schemas/DiscordSnowflake'}
            currentVersion: {$ref: '#/components/schemas/Version'}
            normalizedChanges: {$ref: '#/components/schemas/BotConfigFieldSet'}
            warnings: {type: array, items: {$ref: '#/components/schemas/BotConfigValidationIssue'}}
            errors: {type: array, items: {$ref: '#/components/schemas/BotConfigValidationIssue'}}
            mayApply: {type: boolean}
            validationToken:
              type: [string, 'null']
              description: Present only when mayApply is true; required by updateBotConfig.
            validationExpiresAt:
              type: [string, 'null']
              format: date-time
            requiredPermissions:
              type: array
              uniqueItems: true
              items: {type: string, enum: [bot_config.operational.manage, bot_config.security.manage]}
    BotConfigUpdateEnvelope:
      type: object
      additionalProperties: false
      required: [requestId, data]
      properties:
        requestId: {type: string}
        data:
          type: object
          additionalProperties: false
          required: [guildId, previousVersion, version, auditEventId, updatedAt]
          properties:
            guildId: {$ref: '#/components/schemas/DiscordSnowflake'}
            previousVersion: {$ref: '#/components/schemas/Version'}
            version: {$ref: '#/components/schemas/Version'}
            auditEventId: {type: string, format: uuid}
            updatedAt: {type: string, format: date-time}
    BotConfigDeliveryTestEnvelope:
      type: object
      additionalProperties: false
      required: [requestId, data]
      properties:
        requestId: {type: string}
        data:
          type: object
          additionalProperties: false
          required: [guildId, version, channelField, channelId, delivered, messageId, testedAt]
          properties:
            guildId: {$ref: '#/components/schemas/DiscordSnowflake'}
            version: {$ref: '#/components/schemas/Version'}
            channelField: {$ref: '#/components/schemas/BotConfigChannelFieldName'}
            channelId: {$ref: '#/components/schemas/DiscordSnowflake'}
            delivered: {type: boolean}
            messageId:
              anyOf: [{$ref: '#/components/schemas/DiscordSnowflake'}, {type: 'null'}]
            testedAt: {type: string, format: date-time}
