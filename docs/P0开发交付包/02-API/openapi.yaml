          example: {requestId: req_role_sync, data: {discordUserId: '123456789012345678', previousLevel: L1_SUPPORT, requestedLevel: L2_SUPERVISOR, effectiveLevel: L2_SUPERVISOR, status: APPLIED, permissionsVersion: 5, sessionsRevoked: true}}
    RoleElevationPendingResponse:
      description: First high-level Role observed; existing level remains effective
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RoleElevationPendingEnvelope'
          example: {requestId: req_elevation_pending, data: {code: ROLE_ELEVATION_PENDING, staffId: 8c504f2e-557e-486d-bbd6-4e99857a814a, effectiveLevel: L2_SUPERVISOR, requestedLevel: L3_OPERATIONS, approvalRequestId: 2545f1f6-8880-4abf-bbde-98f8bcad3c3d}}
    StaffAccessResponse:
      description: Effective staff access updated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StaffAccessEnvelope'
          example: {requestId: req_staff_access, data: {staffId: 8c504f2e-557e-486d-bbd6-4e99857a814a, level: L3_OPERATIONS, requestedLevel: null, status: ACTIVE, permissionsVersion: 6, sessionsRevoked: true}}
    SessionRevocationResponse:
      description: Sessions revoked idempotently
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SessionRevocationEnvelope'
          example: {requestId: req_revoke_sessions, data: {staffId: 8c504f2e-557e-486d-bbd6-4e99857a814a, revokedSessionCount: 3, revokedAt: '2026-07-15T16:40:00Z'}}
    PolicySettingsResponse:
      description: Policy setting versions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PolicySettingsEnvelope'
          example: {requestId: req_policy, data: {items: [{key: L2_GIFT_APPROVAL_LIMIT_MINOR, integerValue: 200000, currency: CNY, version: 1}]}}
    PolicySettingResponse:
      description: Appended policy version
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/PolicySettingEnvelope'
          example: {requestId: req_policy_update, data: {key: L2_GIFT_APPROVAL_LIMIT_MINOR, integerValue: 200000, currency: CNY, version: 2}}
    StepUpChallengeResponse:
      description: Step-up challenge created
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StepUpChallengeEnvelope'
          example: {requestId: req_step_up, data: {challengeId: 1b3028fb-cfa0-4f91-9375-6e5ab8c3de35, method: TOTP, expiresAt: '2026-07-15T16:45:00Z'}}
    StepUpStateResponse:
      description: Recent verification active for the current session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StepUpStateEnvelope'
          example: {requestId: req_step_up_done, data: {verifiedAt: '2026-07-15T16:42:00Z', validUntil: '2026-07-15T16:57:00Z'}}
    MfaEnrollmentResponse:
      description: MFA enrollment material for one-time private display
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MfaEnrollmentEnvelope'
          example: {requestId: req_mfa_enroll, data: {enrollmentId: 8f930041-046c-46ac-8f75-a99f1dd222df, method: TOTP, provisioningUri: 'otpauth://totp/p0:redacted?secret=REDACTED', expiresAt: '2026-07-15T16:50:00Z'}}
    MfaStateResponse:
      description: MFA state activated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MfaStateEnvelope'
          example: {requestId: req_mfa_verify, data: {method: TOTP, enrolled: true, verifiedAt: '2026-07-15T16:45:00Z'}}
    WebhookAcknowledgementResponse:
      description: Verified event acknowledged; duplicates do not reapply effects
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/WebhookAcknowledgementEnvelope'
          example: {requestId: req_webhook, data: {providerEventId: evt_01J2P0, eventType: DEBIT_UPDATED, status: SUCCEEDED, duplicate: false, applied: true, transactionId: a4155aaa-0da4-4f90-b1dd-97fb49227ac1}}

    ValidationError:
      description: Request schema or field validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: VALIDATION_ERROR, message: Request validation failed., retryable: false, details: [{field: expectedVersion, reason: must be a positive integer}]}}
    AuthenticationError:
      description: Service credential, session or required Actor Context is invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: AUTH_REQUIRED, message: Authentication or actor context is invalid., retryable: false, details: []}}
    StaffAccountRequired:
      description: Discord Role has not produced an active internal staff account
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: STAFF_ACCOUNT_REQUIRED, message: An active staff account is required., retryable: false, details: []}}
    PermissionError:
      description: Permission code, level, object ownership or data scope denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: PERMISSION_DENIED, message: The actor is not permitted to perform this action., retryable: false, details: [{field: permission, reason: gift.approve required}]}}
    NotFoundError:
      description: Resource is unavailable in the actor's scope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: RESOURCE_NOT_FOUND, message: The requested resource is unavailable., retryable: false, details: []}}
    ConflictError:
      description: Object version, state, concurrent claim or idempotency fingerprint conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: CONFLICT, message: The resource changed; refresh before retrying., retryable: false, details: [{field: expectedVersion, reason: current version is 4}]}}
    BusinessRuleError:
      description: P0 business rule rejected the action with no partial writes
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: BUSINESS_RULE_VIOLATION, message: The action is not valid for the current object state., retryable: false, details: []}}
    ServiceNotAvailable:
      description: Service disabled, repriced or missing one of the two required prices
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: SERVICE_NOT_AVAILABLE, message: Service or price version is no longer available., retryable: false, details: []}}
    PlayerNotEligible:
      description: Player is not ACTIVE, online, AVAILABLE, matched or free of an active order
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: PLAYER_NOT_ELIGIBLE, message: The player cannot accept this order., retryable: false, details: []}}
    InsufficientAvailableBalance:
      description: providerBalanceMinor minus reservedMinor is below the requested reservation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: INSUFFICIENT_AVAILABLE_BALANCE, message: Available balance is insufficient for this reservation., retryable: false, details: [{field: shortfallMinor, reason: '12000'}]}}
    ReservationConflict:
      description: Reservation version or lifecycle state changed concurrently
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: RESERVATION_CONFLICT, message: The reservation is no longer active., retryable: false, details: [{field: expectedVersion, reason: reservation version is 2}]}}
    CancellationPreviewStale:
      description: Cancellation preview expired or no longer matches order and reservation versions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: CANCELLATION_PREVIEW_STALE, message: Refresh the cancellation preview before retrying., retryable: false, details: [{field: previewId, reason: order or reservation changed}]}}
    ReferralIneligible:
      description: Referral program eligibility failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: REFERRAL_INELIGIBLE, message: The referral attribution is not eligible., retryable: false, details: [{field: referredCustomerId, reason: an active mutually exclusive program already exists}]}}
    ReferralAttributionConflict:
      description: Attribution version, active source or mutually exclusive program conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: REFERRAL_ATTRIBUTION_CONFLICT, message: The referral attribution changed or conflicts with an active program., retryable: false, details: [{field: expectedVersion, reason: refresh confidential detail}]}}
    SelfApprovalForbidden:
      description: Staff role elevation target cannot approve its own elevation before the higher role becomes effective
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: SELF_APPROVAL_FORBIDDEN, message: The staff role elevation target cannot approve its own elevation., retryable: false, details: []}}
    StepUpRequired:
      description: Recent second-factor verification is required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: STEP_UP_REQUIRED, message: Recent verification is required., retryable: true, details: [{field: validForSeconds, reason: '900'}]}}
    ProviderUnavailable:
      description: Neutral external adapter is temporarily unavailable or incompatible
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: PROVIDER_UNAVAILABLE, message: The external service is temporarily unavailable., retryable: true, details: []}}
    ProviderTimeout:
      description: External result may be unknown; query by the original idempotency key before retrying
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: PROVIDER_TIMEOUT, message: The external result is being reconciled; do not submit a new intent., retryable: true, details: []}}
    ServiceUnavailable:
      description: API or a required readiness dependency is unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: SERVICE_UNAVAILABLE, message: Service is unavailable., retryable: true, details: []}}
    BotConfigResponse:
      description: Current validated Guild Bot configuration and actor-manageable fields
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BotConfigEnvelope'
    BotConfigValidationResponse:
      description: Normalized preview with warnings, errors, caller apply authorization and a short-lived signed validation token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BotConfigValidationEnvelope'
    BotConfigUpdateResponse:
      description: Configuration applied with a new version and append-only audit reference
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BotConfigUpdateEnvelope'
    BotConfigDeliveryTestResponse:
      description: Result of a marked Discord test delivery with no business side effects
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BotConfigDeliveryTestEnvelope'
    BotConfigVersionConflict:
      description: Guild Bot configuration changed after the supplied expectedVersion
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: CONFIG_VERSION_CONFLICT, message: Bot configuration changed; refresh before retrying., retryable: false, details: [{field: expectedVersion, reason: current version is 13}]}}
    WebhookSignatureError:
      description: Webhook signature invalid, timestamp expired or replay rejected before mutation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example: {requestId: req_error, error: {code: SIGNATURE_INVALID, message: Webhook verification failed., retryable: false, details: []}}

  schemas:
    ActorSource:
      type: string
      enum: [DISCORD_BOT, DASHBOARD, SYSTEM_JOB, THIRD_PARTY_WEBHOOK]
    UserStatus:
      type: string
      enum: [ACTIVE, PAUSED, SUSPENDED, DISABLED]
      description: Canonical persisted user state; DISABLED is reserved for internal L4 account termination workflows.
    WritableUserStatus:
      type: string
      enum: [ACTIVE, PAUSED, SUSPENDED]
      description: States accepted by the ordinary operational-status API; DISABLED is intentionally excluded.
    StaffLevel:
      type: string
      enum: [L1_SUPPORT, L2_SUPERVISOR, L3_OPERATIONS, L4_ADMIN_OWNER]
    Snowflake:
      type: string
      pattern: '^[0-9]{17,20}$'
    Currency:
      type: string
      pattern: '^[A-Z]{3}$'
      examples: [CNY]
    Money:
      type: object
      additionalProperties: false
      required: [amountMinor, currency]
      properties:
        amountMinor: {type: integer, format: int64, minimum: 0}
        currency: {$ref: '#/components/schemas/Currency'}
    PositiveMoney:
      allOf:
        - $ref: '#/components/schemas/Money'
        - type: object
          properties:
            amountMinor: {type: integer, format: int64, minimum: 1}
    ReasonCode:
      type: string
      pattern: '^[A-Z][A-Z0-9_]{2,63}$'
    Version:
      type: integer
      minimum: 1
    OrderStatus:
      type: string
      enum: [DRAFT, PENDING_DISPATCH, ACCEPTED, IN_SERVICE, PENDING_CONFIRMATION, COMPLETED, CANCELLED, EXCEPTION]
    PlayerReviewStatus:
      type: string
      enum: [PENDING_REVIEW, ACTIVE, PAUSED, SUSPENDED]
    PlayerAvailability:
      type: string
      enum: [AVAILABLE, BUSY, OFFLINE]
    DiscordPresence:
      type: string
      enum: [ONLINE, IDLE, DND, OFFLINE, UNKNOWN]
    StaffTaskStatus:
      type: string
      enum: [OPEN, CLAIMED, VERIFIED, PENDING_APPROVAL, APPROVED, REJECTED, RESOLVED, CANCELLED]
    StaffTaskType:
      type: string
      enum: [ORDER_ASSIST, CANCELLATION_ASSIST, GIFT_REVIEW, PLAYER_START_LATE, PLAYER_NO_SHOW, CUSTOMER_NO_SHOW, SERVICE_INTERRUPTED, COMPLETION_REVIEW, DISPUTE, AUTOMATION_FAILURE]
    GiftRequestStatus:
      type: string
      enum: [PENDING_REVIEW, PENDING_APPROVAL, APPROVED, CAPTURED, ANNOUNCED, REJECTED, EXPIRED, WITHDRAWN, FAILED, REVERSED]
    FundReservationStatus:
      type: string
      enum: [PENDING, ACTIVE, DISPUTED, PARTIALLY_SETTLED, CAPTURED, RELEASED, EXPIRED, FAILED]
    FundReservationSourceType:
      type: string
      enum: [ORDER, GIFT]
    ReadinessValue:
      type: string
      enum: [NOT_READY, READY]
    ReadinessActorRole:
      type: string
      enum: [CUSTOMER, PLAYER]
    AutomationState:
      type: string
      enum: [RUNNING, PAUSED]
    CancellationFundAction:
      type: string
      enum: [RELEASE_RESERVATION, REFUND_CAPTURED_FUNDS, HOLD_FOR_STAFF_REVIEW, NONE]
    ReferralProgramType:
      type: string
      enum: [PROMOTER_FIRST_PURCHASE, PLAYER_LIFETIME]
    ReferralAttributionStatus:
      type: string
      enum: [ACTIVE, FULFILLED, SUPERSEDED, REVOKED]
    ReferralRewardMode:
      type: string
      enum: [FIXED_FIRST_PURCHASE, PERCENT_FIRST_PURCHASE, PERCENT_LIFETIME]
    FinancialRecordStatus:
      type: string
      enum: [PENDING, CONFIRMED, PAID, REVERSED]
    AdminConsumptionMirrorType:
      type: string
      enum: [ORDER, GIFT, REFUND_REVERSAL]
    RiskSeverity:
      type: string
      enum: [LOW, MEDIUM, HIGH]
    RiskEventSource:
      type: string
      enum: [STAFF_REVIEW, CUSTOMER_REPORT, PLAYER_REPORT, SYSTEM_SIGNAL]
    ApprovalStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, EXPIRED, CANCELLED]
    ProviderTransactionStatus:
      type: string
      enum: [UNKNOWN, PENDING, SUCCEEDED, FAILED]
      description: Normalized status emitted by the adapter for either DEBIT_UPDATED or REFUND_UPDATED.
    RefundTransactionStatus:
      type: string
      enum: [UNKNOWN, PENDING, SUCCEEDED, FAILED]
      description: Lifecycle of one refund transaction; SUCCEEDED means the refund operation succeeded.
    DebitAggregateStatus:
      type: string
      enum: [UNKNOWN, PENDING, SUCCEEDED, FAILED, PARTIALLY_REFUNDED, REFUNDED]
      description: Aggregate state of the original debit after applying successful refund transactions.
    JobType:
      type: string
      enum: [GIFT_ANNOUNCEMENT, DISPATCH_MESSAGE, DISPATCH_TIMEOUT, CHANNEL_ARCHIVE, PANEL_SYNC, ROLE_RECONCILIATION]
    JobStatus:
      type: string
      enum: [PENDING, PROCESSING, COMPLETED, FAILED, CANCELLED]
    PageCursor:
      type: [string, 'null']
      maxLength: 500
    ErrorDetail:
      type: object
      additionalProperties: false
      required: [field, reason]
      properties:
        field: {type: string, maxLength: 100}
        reason: {type: string, maxLength: 300}
    ApiError:
      type: object
      additionalProperties: false
      required: [code, message, retryable, details]
      properties:
        code:
          type: string
          enum: [VALIDATION_ERROR, AUTH_REQUIRED, STAFF_ACCOUNT_REQUIRED, PERMISSION_DENIED, RESOURCE_NOT_FOUND, CONFLICT, CONFIG_VERSION_CONFLICT, IDEMPOTENCY_CONFLICT, BUSINESS_RULE_VIOLATION, SERVICE_NOT_AVAILABLE, PLAYER_NOT_ELIGIBLE, REFERRAL_INELIGIBLE, REFERRAL_ATTRIBUTION_CONFLICT, SELF_APPROVAL_FORBIDDEN, STEP_UP_REQUIRED, APPROVAL_PENDING, ROLE_ELEVATION_PENDING, INSUFFICIENT_FUNDS, INSUFFICIENT_AVAILABLE_BALANCE, RESERVATION_CONFLICT, CANCELLATION_PREVIEW_STALE, AUTOMATION_STATE_CONFLICT, PROVIDER_UNAVAILABLE, PROVIDER_TIMEOUT, SIGNATURE_INVALID, REPLAY_REJECTED, SERVICE_UNAVAILABLE]
        message: {type: string, maxLength: 300}
        retryable: {type: boolean}
        details:
          type: array
          maxItems: 20
          items: {$ref: '#/components/schemas/ErrorDetail'}
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [requestId, error]
      properties:
        requestId: {type: string}
        error: {$ref: '#/components/schemas/ApiError'}

    CreateBindingRequest:
      type: object
      additionalProperties: false
      required: [credentialType, credentialValue, expectedCurrency]
      properties:
        credentialType: {type: string, enum: [ONE_TIME_CODE, EXTERNAL_USER_ID]}
        credentialValue: {type: string, minLength: 1, maxLength: 500, writeOnly: true, x-sensitive: true}
        expectedCurrency: {$ref: '#/components/schemas/Currency'}
    EstimateServiceRequest:
      type: object
      additionalProperties: false
      required: [unitCount]
      properties:
        unitCount: {type: integer, minimum: 1, maximum: 1440}
        region: {type: [string, 'null'], maxLength: 100}
    CreateOrderRequest:
      type: object
      additionalProperties: false
      required: [orderType, channelSpec]
      properties:
        orderType: {const: IMMEDIATE}
        channelSpec: {$ref: '#/components/schemas/ChannelSpec'}
    UpdateOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, serviceCatalogId, unitCount]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        serviceCatalogId: {type: string, format: uuid}
        unitCount: {type: integer, minimum: 1, maximum: 1440}
        region: {type: [string, 'null'], maxLength: 100}
        notes: {type: [string, 'null'], maxLength: 1000}
        voiceChannelId:
          anyOf: [{$ref: '#/components/schemas/Snowflake'}, {type: 'null'}]
    EstimateOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
    SubmitOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, acceptedAmount]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        acceptedAmount: {$ref: '#/components/schemas/PositiveMoney'}
    CancellationPreviewRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, reasonCode]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        reasonCode: {$ref: '#/components/schemas/ReasonCode'}
    CancelOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, previewId, reasonCode]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        previewId: {type: string, format: uuid}
        reasonCode: {$ref: '#/components/schemas/ReasonCode'}
        note: {type: [string, 'null'], maxLength: 1000}
    DispatchOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, trigger]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        trigger: {type: string, enum: [ORDER_SUBMITTED, MANUAL_RETRY, TIMEOUT_RETRY]}
    AcceptOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, dispatchAttemptId]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        dispatchAttemptId: {type: string, format: uuid}
    OrderVersionRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
    SetOrderReadinessRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, readiness]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        readiness: {$ref: '#/components/schemas/ReadinessValue'}
    ConfirmOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, confirmation]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        confirmation: {const: CONFIRM_COMPLETED}
    CreateOrderStaffTaskRequest:
      type: object
      additionalProperties: false
      required: [type, reasonCode]
      properties:
        type: {$ref: '#/components/schemas/StaffTaskType'}
        reasonCode: {$ref: '#/components/schemas/ReasonCode'}
        note: {type: [string, 'null'], maxLength: 1000}
        voiceChannelId:
          anyOf: [{$ref: '#/components/schemas/Snowflake'}, {type: 'null'}]
    CreateGiftRequest:
      type: object
      additionalProperties: false
      required: [giftCatalogId, expectedOrderVersion]
      properties:
        giftCatalogId: {type: string, format: uuid}
        expectedOrderVersion: {$ref: '#/components/schemas/Version'}
        note: {type: [string, 'null'], maxLength: 500}
    CancelGiftRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, reasonCode]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        reasonCode: {$ref: '#/components/schemas/ReasonCode'}
        note: {type: [string, 'null'], maxLength: 500}
    SetAvailabilityRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, availability]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        availability: {$ref: '#/components/schemas/PlayerAvailability'}
    SyncPresenceRequest:
      type: object
      additionalProperties: false
      required: [guildId, discordUserId, presence, observedAt, sourceEventId]
      properties:
        guildId: {$ref: '#/components/schemas/Snowflake'}
        discordUserId: {$ref: '#/components/schemas/Snowflake'}
        presence: {$ref: '#/components/schemas/DiscordPresence'}
        observedAt: {type: string, format: date-time}
        sourceEventId: {type: string, minLength: 1, maxLength: 200}
    VersionRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
    VerifyTaskRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, verificationMethod, notes]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        verificationMethod: {type: string, enum: [VOICE, DIRECT_MESSAGE, ORDER_CHANNEL]}
        notes: {type: string, minLength: 1, maxLength: 2000}
    ResolveTaskRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, resolutionCode, notes]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        resolutionCode: {$ref: '#/components/schemas/ReasonCode'}
        notes: {type: string, minLength: 1, maxLength: 2000}
    RefundOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, amount, reasonCode, evidenceNote, confirmation]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
        amount: {$ref: '#/components/schemas/PositiveMoney'}
        reasonCode: {$ref: '#/components/schemas/ReasonCode'}
        evidenceNote: {type: string, minLength: 1, maxLength: 2000}
        confirmation: {const: EXECUTE_OR_REQUEST_APPROVAL}
    ResolveOrderRequest:
      type: object
      additionalProperties: false
      required: [expectedVersion, targetStatus, reasonCode, refund, playerEarning, evidenceNote, confirmation]
      properties:
        expectedVersion: {$ref: '#/components/schemas/Version'}
