  /api/v1/webhooks/payment/{providerKey}:
    post:
      tags: [Webhooks]
      operationId: handlePaymentWebhook
      summary: Capture, verify and apply a payment provider's raw webhook idempotently
      description: |
        This public route accepts the exact bytes and media type sent by the selected
        provider. The server captures all HTTP headers and the receipt time without
        requiring a JSON wrapper or normalized supplier header names. Before any JSON
        parsing or business mutation, the API constructs the internal
        ProviderWebhookEnvelope and calls the neutral adapter verifyWebhook operation.
        Duplicate verified event IDs return the original acknowledgement.
      security: []
      x-required-permissions: [webhook.payment.receive]
      x-actor-context:
        acceptedSources: [THIRD_PARTY_WEBHOOK]
        resolution: verified-provider-event-not-human-actor
      x-provider-operations: [verifyWebhook]
      x-idempotency-source: providerKey-plus-providerEventId
      x-webhook-verification:
        captureAllHttpHeaders: true
        preserveExactRawBytes: true
        verifyBeforeParse: true
        publicRequestUsesInternalEnvelope: false
        internalAdapterInputSchema:
          title: ProviderWebhookEnvelope
          type: object
          description: Internal verifyWebhook input constructed by the API; never accepted as the public request body.
          additionalProperties: false
          required: [headers, rawBodyBase64, receivedAt]
          properties:
            headers:
              type: object
              additionalProperties: {type: string}
              maxProperties: 100
              x-sensitive: true
            rawBodyBase64: {type: string, contentEncoding: base64, writeOnly: true, x-sensitive: true}
            receivedAt: {type: string, format: date-time}
      parameters:
        - $ref: '#/components/parameters/ProviderKey'
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        description: Exact provider body bytes. The API must not parse or reserialize these bytes before adapter verification.
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
            example: raw-provider-body-bytes
          '*/*':
            schema:
              type: string
              format: binary
            example: raw-provider-body-bytes
      responses:
        '200':
          $ref: '#/components/responses/WebhookAcknowledgementResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/WebhookSignatureError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '422':
          $ref: '#/components/responses/BusinessRuleError'
        '503':
          $ref: '#/components/responses/ProviderUnavailable'

components:
  securitySchemes:
    BotServiceToken:
      type: http
      scheme: bearer
      bearerFormat: opaque-bot-service-token
      description: Restricted Sapphire Bot service credential. Actor headers are trusted only after this credential is validated.
    DashboardSession:
      type: apiKey
      in: cookie
      name: p0_session
      description: Server-side Discord OAuth2 staff session. Actor identity and permissions are loaded from the session and database.
    InternalServiceToken:
      type: http
      scheme: bearer
      bearerFormat: opaque-internal-service-token
      description: Restricted API worker credential for system-owned jobs such as automatic dispatch.
  parameters:
    ClientSource:
      name: X-Client-Source
      in: header
      required: true
      schema:
        $ref: '#/components/schemas/ActorSource'
      description: Calling surface. It never grants permissions.
      example: DISCORD_BOT
    ActorDiscordUserId:
      name: X-Actor-Discord-User-Id
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/Snowflake'
      description: Required with BotServiceToken for human actions; ignored for DashboardSession authorization.
      example: '123456789012345678'
    ActorDiscordUserIdRequired:
      name: X-Actor-Discord-User-Id
      in: header
      required: true
      schema:
        $ref: '#/components/schemas/Snowflake'
      description: Discord actor supplied by the authenticated Bot service; never accepted from an untrusted client.
      example: '123456789012345678'
    ActorGuildId:
      name: X-Actor-Guild-Id
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/Snowflake'
      description: Required with BotServiceToken for a guild-scoped human action.
      example: '987654321098765432'
    ActorGuildIdRequired:
      name: X-Actor-Guild-Id
      in: header
      required: true
      schema:
        $ref: '#/components/schemas/Snowflake'
      description: Guild scope supplied by the authenticated Bot service.
      example: '987654321098765432'
    DiscordInteractionId:
      name: X-Discord-Interaction-Id
      in: header
      required: false
      schema:
        $ref: '#/components/schemas/Snowflake'
      description: Optional Discord interaction correlation ID, stored in audit records.
      example: '112233445566778899'
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 200
        pattern: '^[A-Za-z0-9:_-]+$'
      description: Stable intent key. A retry must reuse the original key; the same key with a changed fingerprint returns IDEMPOTENCY_CONFLICT.
      example: discord:112233445566778899
    RequestId:
      name: X-Request-Id
      in: header
      required: false
      schema:
        type: string
        minLength: 8
        maxLength: 100
      description: Optional caller correlation ID; the API always returns a requestId.
      example: req_01J2P0_API
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
        minLength: 1
        maxLength: 500
      description: Opaque stable pagination cursor.
    PageLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 8f0de2a5-a8d5-4c24-b32c-4b6673acb510
    ServiceCatalogId:
      name: serviceCatalogId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 4b4aeef1-e4f0-43cf-9716-87a26a1d7299
    GiftCatalogId:
      name: giftCatalogId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: af70de0b-b030-4f44-90b5-fbd0ca368320
    GiftRequestId:
      name: giftRequestId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: e68c1359-7f39-43b5-a18d-30f908270838
    ReferralAttributionId:
      name: referralAttributionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 211f53c3-34cc-4b65-af1b-9950af211ffc
    StaffTaskId:
      name: staffTaskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 1b354942-391a-4c81-bf17-403e228d1ce9
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      example: 5d5a9468-c9ef-4c29-bd70-f5ca6a1a0d02
    PlayerId:
      name: playerId
      in: path
      required: true
      schema:
        type: string
